services:
  # ── MongoDB (replica set for transaction support) ─────
  mongodb:
    image: mongo:7.0
    container_name: rpv-mongodb
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-rpv_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME:-regal_park_villas}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }; db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rpv-network

  # ── Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rpv-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-rpv_admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DB_NAME:-regal_park_villas}?authSource=admin&replicaSet=rs0
      DB_NAME: ${DB_NAME:-regal_park_villas}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET (min 32 chars)}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - rpv-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (Nginx + Expo Web) ────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rpv-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rpv-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Redis (distributed rate limiting) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: rpv-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - rpv-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  rpv-network:
    driver: bridge
