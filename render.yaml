services:
  - type: web
    name: regal-park-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        value: mongodb+srv://rpv_admin:rpv_admin@cluster0.bsx0gqz.mongodb.net/regal_park_villas?retryWrites=true&w=majority&appName=Cluster0
      - key: JWT_SECRET
        value: rpv-super-secret-jwt-key-2025
      - key: SEED_DEMO_DATA
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "https://daearth.in,https://www.daearth.in,https://regal-park.vercel.app"
    plan: free
    region: oregon
